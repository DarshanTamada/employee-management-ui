<div class="profile-container">

  <div class="profile-card">

    <h2>User Profile</h2>

    <div class="profile-item">
      <label>Name:</label>
      <span>{{ name }}</span>
    </div>

    <div class="profile-item">
      <label>Email:</label>
      <span>{{ email }}</span>
    </div>

    <div class="profile-item">
      <label>Role:</label>
      <span>{{ role }}</span>
    </div>

    <div class="profile-item">
      <label>Token Status:</label>
      <span>{{ tokenStatus }}</span>
    </div>

  </div>

</div>
