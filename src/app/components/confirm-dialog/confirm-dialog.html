<div class="dialog-backdrop"
     (click)="cancel()">

  <div
       class="dialog-container"
       (click)="$event.stopPropagation()">

    <h2>{{ title }}</h2>

    <p>{{ message }}</p>

    <div class="button-group">

      <button (click)="cancel()"
              class="cancel-btn">
        No
      </button>

      <button (click)="confirm()"
              class="confirm-btn">
        Yes
      </button>

    </div>

  </div>

 </div>
